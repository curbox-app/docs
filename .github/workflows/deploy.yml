name: Deploy to GitHub Pages

on:
  # Trigger on pushes to the main branch
  push:
    branches: [main]
  # Allow manual runs from the Actions tab
  workflow_dispatch:

# Grant GITHUB_TOKEN the permissions required to make a Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; skip queued runs but do not cancel
# an in-progress deployment to avoid leaving the site in a half-deployed state.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # withastro/action handles Node setup, dependency install, `astro build`,
      # and uploading the built site as a GitHub Pages artifact in one step.
      #
      # This is the documentation subsite. It is served at curbox.app/docs/
      # because the main site repo (curbox-app.github.io) is the org user page
      # holding the curbox.app custom domain, and this project repo is named
      # `docs`. The `/docs` base path is set in astro.config.mjs — do NOT add a
      # CNAME file here, or it would try to claim the apex domain.
      - name: Build with Astro
        uses: withastro/action@v3
        with:
          package-manager: bun@latest

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
